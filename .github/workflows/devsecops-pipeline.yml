name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  sast-bandit:
    name: "SAST - Bandit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Bandit
        run: |
          pip install bandit
          bandit -r devsecops-project/app/ -f json -o bandit-report.json || true
          bandit -r devsecops-project/app/ -f html -o bandit-report.html || true

      - name: Bandit Summary
        run: |
          pip install jq 2>/dev/null || true
          python3 - <<'EOF'
          import json
          with open("bandit-report.json") as f:
              r = json.load(f)
          t = r["metrics"]["_totals"]
          results = r.get("results", [])
          high = [x for x in results if x["issue_severity"] == "HIGH"]
          medium = [x for x in results if x["issue_severity"] == "MEDIUM"]
          low = [x for x in results if x["issue_severity"] == "LOW"]

          print("## Bandit SAST Security Report", flush=True)
          print(f"| Severity | Count |", flush=True)
          print(f"|----------|-------|", flush=True)
          print(f"| HIGH     | {t['SEVERITY.HIGH']} |", flush=True)
          print(f"| MEDIUM   | {t['SEVERITY.MEDIUM']} |", flush=True)
          print(f"| LOW      | {t['SEVERITY.LOW']} |", flush=True)
          print(f"| **Total**| **{t['SEVERITY.HIGH']+t['SEVERITY.MEDIUM']+t['SEVERITY.LOW']}** |", flush=True)
          print("", flush=True)
          print("### HIGH Severity Issues", flush=True)
          for i in high:
              print(f"- **{i['test_name']}** ({i['test_id']}) — `{i['filename']}` line {i['line_number']}", flush=True)
              print(f"  - {i['issue_text']}", flush=True)
          print("", flush=True)
          print("### MEDIUM Severity Issues", flush=True)
          for i in medium:
              print(f"- **{i['test_name']}** ({i['test_id']}) — `{i['filename']}` line {i['line_number']}", flush=True)
              print(f"  - {i['issue_text']}", flush=True)
          print("", flush=True)
          print("### LOW Severity Issues", flush=True)
          for i in low:
              print(f"- **{i['test_name']}** ({i['test_id']}) — `{i['filename']}` line {i['line_number']}", flush=True)
              print(f"  - {i['issue_text']}", flush=True)
          EOF >> $GITHUB_STEP_SUMMARY

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: |
            bandit-report.json
            bandit-report.html
  sca-snyk:
    name: "SCA - Snyk"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Snyk
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=devsecops-project/app/requirements.txt --severity-threshold=high


  secrets-trufflehog:
    name: "Secrets - TruffleHog"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        continue-on-error: true
        with:
          path: ./
          extra_args: --only-verified


  unit-tests:
    name: "Unit Tests"
    runs-on: ubuntu-latest
    needs: [sast-bandit, sca-snyk]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and test
        env:
          ENCRYPTION_KEY: ${{ secrets.TEST_ENCRYPTION_KEY }}
          SECRET_TOKEN: ${{ secrets.TEST_SECRET_TOKEN }}
        run: |
          cd devsecops-project
          pip install -r app/requirements.txt
          pip install pytest pytest-cov
          PYTHONPATH=. pytest tests/ -v --cov=app --cov-report=xml || true
          echo "Tests complete"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: devsecops-project/coverage.xml


  build-and-push:
    name: "Build & Push Image"
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: devsecops-project
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/privacy-preserving-app:latest


  image-scan-trivy:
    name: "Image Scan - Trivy"
    runs-on: ubuntu-latest
    needs: [build-and-push]
    steps:
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ${{ secrets.ACR_LOGIN_SERVER }}/privacy-preserving-app:latest
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
        env:
          TRIVY_USERNAME: ${{ secrets.ACR_USERNAME }}
          TRIVY_PASSWORD: ${{ secrets.ACR_PASSWORD }}


  deploy-azure:
    name: "Deploy - Azure Container Apps"
    runs-on: ubuntu-latest
    needs: [image-scan-trivy]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App image
        run: |
          az containerapp update \
            --name "ca-privacy-app" \
            --resource-group "rg-devsecops-prod" \
            --image "${{ secrets.ACR_LOGIN_SERVER }}/privacy-preserving-app:latest" \
            --set-env-vars "ENCRYPTION_KEY=${{ secrets.TEST_ENCRYPTION_KEY }}" "SECRET_TOKEN=${{ secrets.TEST_SECRET_TOKEN }}"

      - name: Get App URL
        run: |
          APP_URL=$(az containerapp show \
            --name "ca-privacy-app" \
            --resource-group "rg-devsecops-prod" \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "App deployed at: https://$APP_URL"
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **App URL:** https://$APP_URL" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ${{ secrets.ACR_LOGIN_SERVER }}/privacy-preserving-app:latest" >> $GITHUB_STEP_SUMMARY
          echo "- **Security Gates:** SAST, SCA, Secrets, Unit Tests, Image Scan - ALL PASSED" >> $GITHUB_STEP_SUMMARY
