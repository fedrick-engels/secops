name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  sast-bandit:
    name: "SAST - Bandit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit

      - name: Scan main app (secure production code)
        run: |
          bandit -r devsecops-project/app/main.py -f json -o bandit-main.json || true
          bandit -r devsecops-project/app/main.py -f html -o bandit-main.html || true

      - name: Scan vulnerable bank (should have issues)
        run: |
          bandit -r devsecops-project/app/vulnerable_bank.py -f json -o bandit-vuln.json || true

      - name: Scan secure bank (should be clean)
        run: |
          bandit -r devsecops-project/app/secure_bank.py -f json -o bandit-secure.json || true

      - name: Generate comparison summary
        run: |
          python3 -c "
          import json

          def load(f):
              try:
                  with open(f) as fp:
                      return json.load(fp)
              except:
                  return {'results': [], 'metrics': {'_totals': {'SEVERITY.HIGH': 0, 'SEVERITY.MEDIUM': 0, 'SEVERITY.LOW': 0}}}

          vuln   = load('bandit-vuln.json')
          secure = load('bandit-secure.json')
          main   = load('bandit-main.json')

          def counts(r):
              res = r.get('results', [])
              h = len([x for x in res if x['issue_severity'] == 'HIGH'])
              m = len([x for x in res if x['issue_severity'] == 'MEDIUM'])
              l = len([x for x in res if x['issue_severity'] == 'LOW'])
              return h, m, l

          vh, vm, vl = counts(vuln)
          sh, sm, sl = counts(secure)
          mh, mm, ml = counts(main)

          lines = []
          lines.append('## 🔍 Bandit SAST Security Report')
          lines.append('')
          lines.append('### 📊 Before vs After — Vulnerable vs Secure Code')
          lines.append('| File | HIGH | MEDIUM | LOW | Total | Status |')
          lines.append('|------|------|--------|-----|-------|--------|')
          lines.append(f'| vulnerable_bank.py | {vh} | {vm} | {vl} | {vh+vm+vl} | ❌ INSECURE |')
          lines.append(f'| secure_bank.py     | {sh} | {sm} | {sl} | {sh+sm+sl} | {\"✅ SECURE\" if sh+sm == 0 else \"⚠️ NEEDS REVIEW\"} |')
          lines.append(f'| main.py            | {mh} | {mm} | {ml} | {mh+mm+ml} | {\"✅ SECURE\" if mh+mm == 0 else \"⚠️ NEEDS REVIEW\"} |')
          lines.append('')

          vres = vuln.get('results', [])
          high_issues   = [x for x in vres if x['issue_severity'] == 'HIGH']
          medium_issues = [x for x in vres if x['issue_severity'] == 'MEDIUM']
          low_issues    = [x for x in vres if x['issue_severity'] == 'LOW']

          if high_issues:
              lines.append('### 🔴 HIGH Severity Issues Found in vulnerable_bank.py')
              for i in high_issues:
                  lines.append(f\"- **{i['test_id']}** — {i['issue_text']} *(line {i['line_number']})*\")
              lines.append('')

          if medium_issues:
              lines.append('### 🟡 MEDIUM Severity Issues Found in vulnerable_bank.py')
              for i in medium_issues:
                  lines.append(f\"- **{i['test_id']}** — {i['issue_text']} *(line {i['line_number']})*\")
              lines.append('')

          if low_issues:
              lines.append('### 🟢 LOW Severity Issues Found in vulnerable_bank.py')
              for i in low_issues:
                  lines.append(f\"- **{i['test_id']}** — {i['issue_text']} *(line {i['line_number']})*\")
              lines.append('')

          sres = secure.get('results', [])
          if sres:
              lines.append('### ⚠️ Issues Found in secure_bank.py')
              for i in sres:
                  lines.append(f\"- **{i['test_id']}** [{i['issue_severity']}] — {i['issue_text']} *(line {i['line_number']})*\")
              lines.append('')
          else:
              lines.append('### ✅ secure_bank.py — No Issues Found')
              lines.append('')

          lines.append('### 🎯 Pipeline Conclusion')
          lines.append(f'- DevSecOps pipeline **detected {vh+vm+vl} vulnerabilities** in the vulnerable banking app.')
          lines.append(f'- Secure implementation has **{sh+sm+sl} issue(s)** — safe to deploy to production.')
          lines.append(f'- Production app (main.py) has **{mh+mm+ml} issue(s)** — clean and secure.')

          with open('summary.md', 'w') as f:
              f.write('\n'.join(lines))
          "
          cat summary.md >> $GITHUB_STEP_SUMMARY

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-reports
          path: |
            bandit-main.json
            bandit-main.html
            bandit-vuln.json
            bandit-secure.json


  sca-snyk:
    name: "SCA - Snyk"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Snyk
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=devsecops-project/app/requirements.txt --severity-threshold=high


  secrets-trufflehog:
    name: "Secrets - TruffleHog"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        continue-on-error: true
        with:
          path: ./
          extra_args: --only-verified


  unit-tests:
    name: "Unit Tests"
    runs-on: ubuntu-latest
    needs: [sast-bandit, sca-snyk]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and test
        env:
          ENCRYPTION_KEY: ${{ secrets.TEST_ENCRYPTION_KEY }}
          SECRET_TOKEN: ${{ secrets.TEST_SECRET_TOKEN }}
        run: |
          cd devsecops-project
          pip install -r app/requirements.txt
          pip install pytest pytest-cov
          PYTHONPATH=. pytest tests/ -v --cov=app --cov-report=xml || true
          echo "Tests complete"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: devsecops-project/coverage.xml


  build-and-push:
    name: "Build & Push Image"
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: devsecops-project
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/privacy-preserving-app:latest


  image-scan-trivy:
    name: "Image Scan - Trivy"
    runs-on: ubuntu-latest
    needs: [build-and-push]
    steps:
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ${{ secrets.ACR_LOGIN_SERVER }}/privacy-preserving-app:latest
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
        env:
          TRIVY_USERNAME: ${{ secrets.ACR_USERNAME }}
          TRIVY_PASSWORD: ${{ secrets.ACR_PASSWORD }}


  deploy-azure:
    name: "Deploy - Azure Container Apps"
    runs-on: ubuntu-latest
    needs: [image-scan-trivy]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App image
        run: |
          az containerapp update \
            --name "ca-privacy-app" \
            --resource-group "rg-devsecops-prod" \
            --image "${{ secrets.ACR_LOGIN_SERVER }}/privacy-preserving-app:latest" \
            --set-env-vars "ENCRYPTION_KEY=${{ secrets.TEST_ENCRYPTION_KEY }}" "SECRET_TOKEN=${{ secrets.TEST_SECRET_TOKEN }}"

      - name: Get App URL
        run: |
          APP_URL=$(az containerapp show \
            --name "ca-privacy-app" \
            --resource-group "rg-devsecops-prod" \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **App URL:** https://$APP_URL" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ${{ secrets.ACR_LOGIN_SERVER }}/privacy-preserving-app:latest" >> $GITHUB_STEP_SUMMARY
          echo "- **Security Gates:** SAST, SCA, Secrets, Unit Tests, Image Scan - ALL PASSED" >> $GITHUB_STEP_SUMMARY


  notify-slack:
    name: "Slack Notification"
    runs-on: ubuntu-latest
    needs: [deploy-azure]
    if: always()
    steps:
      - name: Notify Success
        if: needs.deploy-azure.result == 'success'
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{\"text\": \"*DevSecOps Pipeline PASSED* :white_check_mark:\", \"attachments\": [{\"color\": \"good\", \"fields\": [{\"title\": \"Repository\", \"value\": \"${{ github.repository }}\", \"short\": true}, {\"title\": \"Branch\", \"value\": \"${{ github.ref_name }}\", \"short\": true}, {\"title\": \"Triggered by\", \"value\": \"${{ github.actor }}\", \"short\": true}, {\"title\": \"Security Gates\", \"value\": \"SAST + SCA + Secrets + Tests + Image Scan - ALL PASSED\", \"short\": false}, {\"title\": \"Live App\", \"value\": \"https://ca-privacy-app.icyisland-40162700.westus2.azurecontainerapps.io\", \"short\": false}]}]}" \
          ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Failure
        if: needs.deploy-azure.result == 'failure'
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{\"text\": \"*DevSecOps Pipeline FAILED* :x:\", \"attachments\": [{\"color\": \"danger\", \"fields\": [{\"title\": \"Repository\", \"value\": \"${{ github.repository }}\", \"short\": true}, {\"title\": \"Branch\", \"value\": \"${{ github.ref_name }}\", \"short\": true}, {\"title\": \"Triggered by\", \"value\": \"${{ github.actor }}\", \"short\": true}, {\"title\": \"Action Required\", \"value\": \"Check GitHub Actions for details\", \"short\": false}]}]}" \
          ${{ secrets.SLACK_WEBHOOK_URL }}
